name: Build and Push Elasticsearch with Sudachi

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ELASTIC_VER: 7.17.8
  SUDACHI_PLUGIN_VER: 3.3.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ES with Sudachi
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./es/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/lqvp/elasticsearch-${{ env.ELASTIC_VER }}-${{ env.SUDACHI_PLUGIN_VER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max